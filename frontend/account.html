<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Estoque</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: '#1e3a8a',
                        lightblue: '#3b82f6',
                        orange: '#f97316',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .sidebar { transition: all 0.3s ease; }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-text { display: none; }
        .sidebar.collapsed .logo-text { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; }
        .chart-container { height: 250px; }
    </style>
</head>

<body class="bg-gray-100 font-sans">

<div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="sidebar bg-darkblue text-white flex flex-col w-64">
        <div class="p-4 flex items-center border-b border-blue-800">
            <div class="bg-orange p-2 rounded-lg">
                <i class="fas fa-boxes text-white text-xl"></i>
            </div>
            <span class="logo-text ml-3 text-xl font-bold">Senac Estoque</span>
        </div>

        <div class="p-4 flex-1 overflow-y-auto">
            <div class="text-xs uppercase text-blue-300 mb-4 sidebar-text">
                Menu Principal
            </div>

            <a href="account.html"
               class="nav-item flex items-center py-2 px-3 rounded-lg bg-blue-900 mb-2">
                <i class="fas fa-tachometer-alt mr-3"></i>
                <span class="sidebar-text">Dashboard</span>
            </a>

            <a href="profile.html"
               class="nav-item flex items-center py-2 px-3 rounded-lg hover:bg-blue-800 mb-2">
                <i class="fas fa-user-circle mr-3"></i>
                <span class="sidebar-text">Perfil</span>
            </a>
        </div>

        <div class="p-4 border-t border-blue-800">
            <button onclick="toggleSidebar()" class="flex items-center text-blue-200 hover:text-white">
                <i class="fas fa-chevron-left"></i>
                <span class="sidebar-text ml-2">Recolher</span>
            </button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- HEADER -->
        <header class="bg-white shadow-sm">
            <div class="flex items-center justify-between px-6 py-4">
                <h1 class="text-xl font-semibold text-gray-800">Senac System</h1>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="flex-1 overflow-y-auto p-6 bg-gray-100">

            <!-- CHART + ATIVIDADE -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">

                <div class="bg-white rounded-xl shadow-sm p-6 lg:col-span-2">
                    <h2 class="text-lg font-semibold mb-6">Distribuição de Status</h2>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-lg font-semibold mb-6">Atividade Recente</h2>
                    <p class="text-sm text-gray-500">
                        (atividade dinâmica virá do backend)
                    </p>
                </div>
            </div>

            <!-- TABELA -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold">Itens em Uso</h2>
                    <button id="btnAdicionarItem"
                            class="bg-orange text-white px-4 py-2 rounded-lg hover:bg-orange-600">
                        <i class="fas fa-plus mr-2"></i> Adicionar Item
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Categoria</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Localização</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Responsável</th>
                        </tr>
                        </thead>

                        <tbody id="tabelaItens" class="bg-white divide-y divide-gray-200">
                        <!-- preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="account.js"></script>

<script>
function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('collapsed');

    const chevron = document.querySelector('.fa-chevron-left, .fa-chevron-right');
    if (!chevron) return;

    chevron.classList.toggle('fa-chevron-left');
    chevron.classList.toggle('fa-chevron-right');
}
</script>

</body>
</html>
